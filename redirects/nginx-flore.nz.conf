# flore.nz redirect setup for nginx
#
# Ziel:
# - https://flore.nz/ liefert die Profilseite
# - bestehende Dateien/Ordner unter flore.nz bleiben erreichbar
# - /blog und /blog/* gehen auf blog.flore.nz ohne /blog Prefix
# - alle anderen nicht vorhandenen Pfade gehen auf blog.flore.nz mit gleichem Pfad
# - www.flore.nz wird auf flore.nz kanonisiert

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.flore.nz;

    return 301 https://flore.nz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flore.nz;

    root /var/www/flore.nz;
    index index.html;

    # LLM-Discovery: HTTP-Link-Header auf die llms.txt, damit Agenten die
    # maschinenlesbare Profil-Zusammenfassung ohne Raten finden.
    add_header Link "<https://flore.nz/llms.txt>; rel=\"llms\"" always;

    # /blog ohne Slash
    location = /blog {
        return 301 https://blog.flore.nz/;
    }

    # /blog/* -> blog.flore.nz/* (Prefix entfernen)
    location ^~ /blog/ {
        rewrite ^/blog/(.*)$ https://blog.flore.nz/$1 permanent;
    }

    # Root zeigt die Profilseite
    location = / {
        try_files /index.html =404;
    }

    # Existierende Dateien/Ordner normal ausliefern, sonst Redirect auf Blog
    location / {
        try_files $uri $uri/ @to_blog;
    }

    location @to_blog {
        return 301 https://blog.flore.nz$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name flore.nz www.flore.nz;

    return 301 https://flore.nz$request_uri;
}
